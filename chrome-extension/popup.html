<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Upgrader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      width: 380px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #111;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      background: #6366f1;
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.03em;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    input, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: #1a1a1a;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: #6366f1;
      background: #fff;
    }

    .field {
      margin-bottom: 12px;
    }

    textarea.question { min-height: 64px; }
    textarea.answer   { min-height: 96px; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #save-btn {
      background: #6366f1;
      color: #fff;
    }

    #clear-btn {
      background: #f3f4f6;
      color: #374151;
    }

    #status {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }

    #status.success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
      display: block;
    }

    #status.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      display: block;
    }

    .settings-link {
      display: block;
      text-align: right;
      font-size: 11px;
      color: #9ca3af;
      text-decoration: none;
      margin-top: 10px;
    }

    .settings-link:hover { color: #6366f1; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Prompt Upgrader</h1>
    <span class="badge">MEMORY</span>
  </div>

  <div class="field">
    <label for="source">Source URL</label>
    <input type="url" id="source" placeholder="https://example.com/article" />
  </div>

  <div class="field">
    <label for="question">Question / Concept</label>
    <textarea id="question" class="question" placeholder="What was the key insight or question from this page?"></textarea>
  </div>

  <div class="field">
    <label for="answer">Answer / Summary</label>
    <textarea id="answer" class="answer" placeholder="Write the answer, insight, or summary you want to remember..."></textarea>
  </div>

  <div class="field">
    <label for="tags">Tags</label>
    <input type="text" id="tags" placeholder="prompting, rag, llm (comma-separated)" />
  </div>

  <div class="actions">
    <button id="clear-btn" type="button">Clear</button>
    <button id="save-btn" type="button">Save to Memory</button>
  </div>

  <div id="status"></div>

  <a href="#" class="settings-link" id="settings-link">⚙ Settings (server URL)</a>

  <script src="popup.js"></script>
</body>
</html>
