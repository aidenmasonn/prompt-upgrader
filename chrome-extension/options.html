<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prompt Upgrader — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    p  { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #6b7280;
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    input {
      width: 100%; padding: 9px 12px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 14px; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #6366f1; }
    button {
      margin-top: 16px; padding: 9px 20px; background: #6366f1; color: #fff;
      border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
    #status { margin-top: 12px; font-size: 13px; color: #065f46; }
  </style>
</head>
<body>
  <h1>Settings</h1>
  <p>Configure the URL where your Prompt Upgrader server is running.</p>

  <label for="server-url">Server URL</label>
  <input type="url" id="server-url" placeholder="http://localhost:3000" />

  <button id="save-btn">Save</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
